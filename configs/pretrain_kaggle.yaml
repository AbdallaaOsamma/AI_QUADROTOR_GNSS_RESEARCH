# Pretraining config for NavigationCNN on Kaggle drone obstacle avoidance data
# Usage: python -m src.ai.pretrain_corner_cnn --config configs/pretrain_kaggle.yaml

data:
  root_dir: "data/kaggle_drone_obs/data_collected_potential_final_v58_mod25_320x320_cmds"
  img_size: [84, 84]
  val_split: 0.15
  random_state: 42

train:
  batch_size: 64
  learning_rate: 1.0e-3
  num_epochs: 100
  early_stopping_patience: 15
  clamp:
    vx: [-3.0, 3.0]
    vy: [-1.0, 1.0]
    vz: [-0.5, 0.5]
    r_z_rad: [-0.8, 0.8]

output:
  model_dir: "models/pretrained"
