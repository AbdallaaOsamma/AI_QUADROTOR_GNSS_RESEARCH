data:
  run_dir: "data/expert/centerline"

model:
  img_size: [84, 84]
  grayscale: true
  hidden: [256, 128]
  val_split: 0.2
  random_state: 42

train:
  max_iter: 100
  early_stopping: true
  clamp:
    vx: [-1.0, 1.0]
    vy: [-0.5, 0.5]
    vz: [-0.5, 0.5]
    r_z_rad: [-0.6, 0.6]

output:
  model_dir: "models"