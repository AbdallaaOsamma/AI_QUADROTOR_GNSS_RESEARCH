sim:
  host: "127.0.0.1"
  control_rate_hz: 15

uav:
  takeoff_alt_m: 2.0

record:
  out_dir: "data/expert/centerline"
  duration_s: 60
  camera_name: "front_down" # Use the new angled camera for better road view
  img_size: { width: 640, height: 360 }
  save_images: true
  save_debug: true # Save debug overlays

control:
  vx_fwd: 1.5 # Forward speed (m/s) - FASTER
  k_lat: 0.8 # Lateral gain - increased for stability at speed
  k_yaw: 0.6 # Yaw-rate gain
  vy_max: 1.0 # Max lateral velocity
  rz_max: 1.0 # Max yaw rate

# Vision parameters - optimized for parking garage environment
vision:
  # Relaxed Canny thresholds for better edge detection
  canny_low: 40
  canny_high: 120
  # Lower Hough threshold to detect more lines
  hough_thresh: 20
  # Larger ROI (lower 50% of image)
  roi_ymin_frac: 0.50
  # Minimum lines for confident detection
  min_lines: 4

# Multi-modal perception fallback
perception:
  use_depth: true # Enable depth-based fallback
  use_seg: false # Segmentation (if available)
  depth_near: 2.0 # Near obstacle threshold (m)
  depth_far: 20.0 # Far/open threshold (m)
