# PPO training with domain randomization enabled
# Current DR scope: depth sensor noise + spawn position/yaw jitter
# Proposal also requires (not yet implemented):
#   Physics:  mass, inertia, motor gain, and wind disturbance randomization
#   Sensors:  IMU drift/bias injection, optical flow noise, simulated visual degradation
# See CLAUDE.md Known Issue #7 for implementation notes.

env:
  ip: ""
  image_shape: [84, 84, 1]
  target_alt: 3.0
  max_vx: 3.0
  max_vy: 1.0
  max_yaw_rate_deg: 45
  dt: 0.1
  max_steps: 1024
  depth_clip_m: 20.0

reward:
  w_progress: 0.5
  w_collision: -100.0
  w_smoothness: -0.1
  w_drift: -0.1

domain_randomization:
  enabled: true
  depth_noise_std: 0.02       # ~5% Gaussian noise on normalized depth
  spawn_radius_m: 5.0         # Random spawn within 5m of origin
  vio_enabled: true
  vio_drift_std_per_step: 0.01
  vio_bias_std: 0.005
  flow_noise_std: 0.03
  wind_max_ms: 2.0            # Max horizontal wind component per axis (m/s)
  motor_lag_tau: [0.05, 0.15] # Per-episode motor lag time constant range (s)
  depth_clip_jitter: 2.0      # ±jitter on depth clip range per episode (m)

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 500000

frame_stack: 4

output:
  log_dir: "logs/ppo"
  checkpoint_dir: "models/rl"
  checkpoint_freq: 10000
  eval_freq: 5000
  eval_episodes: 5
