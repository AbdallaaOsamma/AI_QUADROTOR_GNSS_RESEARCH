sim:
  host: "127.0.0.1"
  control_rate_hz: 20        # recording/control frequency for dataset (Hz)

uav:
  takeoff_alt_m: 1.5

record:
  out_dir: "data/expert/record"   # where frames + labels.csv go
  duration_s: 20                  # total recording time (seconds)
  camera_name: "0"                # AirSim forward RGB camera
  image_type: "Scene"             # Scene / DepthPerspective etc.
  img_size:
    width: 640
    height: 360
  jpeg_quality: 95                # if later you switch to JPG; PNG by default

script:
  # A simple scripted "expert" made of timed segments.
  # Each segment sets body-frame velocities (vx, vy, vz) and yaw-rate r_z.
  # Units: m/s for v*, deg/s for r_z (we convert to rad/s in code).
  segments:
    - { name: "takeoff-stabilize",   seconds: 3,  vx: 0.0,  vy: 0.0,  vz: 0.0,  r_z_deg: 0.0 }
    - { name: "forward-1",           seconds: 6,  vx: 1.0,  vy: 0.0,  vz: 0.0,  r_z_deg: 0.0 }
    - { name: "gentle-left-turn",    seconds: 4,  vx: 0.7,  vy: 0.0,  vz: 0.0,  r_z_deg: 15.0 }
    - { name: "forward-2",           seconds: 4,  vx: 1.0,  vy: 0.0,  vz: 0.0,  r_z_deg: 0.0 }
    - { name: "gentle-right-turn",   seconds: 3,  vx: 0.7,  vy: 0.0,  vz: 0.0,  r_z_deg: -15.0 }
