data:
  run_dir: "data/expert/centerline"  # Use centerline data with explicit road guidance

model:
  img_size: [84, 84]
  grayscale: true
  val_split: 0.2
  random_state: 42

train:
  batch_size: 32
  num_epochs: 150
  learning_rate: 0.0005
  early_stopping_patience: 15
  clamp:
    vx: [-1.5, 1.5]  # Forward/backward
    vy: [-1.2, 1.2]  # Left/right - allows proper steering at intersections
    vz: [-0.8, 0.8]  # Up/down
    r_z_rad: [-0.8, 0.8]  # Rotation

output:
  model_dir: "models"
